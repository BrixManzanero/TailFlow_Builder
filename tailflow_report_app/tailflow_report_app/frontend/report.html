<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TailFlow — Consolidated Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>/*CSS*/</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="title">
      <h1>TailFlow — Consolidated Report</h1>
      <div class="s">Auto-extracted from platform exports · <b id="span">—</b> · all values in PHP</div>
    </div>
    <div class="stamp" id="stamp">EXTRACTED —</div>
  </div>
  <div class="kstrip" id="kstrip"></div>
  <div class="sheet"><div class="scroll" id="scroll"></div></div>
  <div class="tabs">
    <div class="tab active" data-t="revenue"><span class="sw" style="background:var(--navy)"></span>Revenue (GMV &amp; NMV)</div>
    <div class="tab" data-t="conversion"><span class="sw" style="background:#9aa6b2"></span>Conversion</div>
    <div class="tab" data-t="roas"><span class="sw" style="background:#9aa6b2"></span>ROAS</div>
    <div class="tab" data-t="products_yoy"><span class="sw" style="background:var(--green)"></span>Product YoY</div>
    <div class="tab" data-t="products_mom"><span class="sw" style="background:#0B6E77"></span>Product MoM</div>
  </div>
  <div class="foot" id="foot"></div>
</div>
<script>
const D = /*DATA*/;
const peso=(v,dec=2)=>Number(v).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
const intc=v=>Number(v).toLocaleString('en-US');
const PLAT=['Shopee','Shopify','Lazada','TikTok'];
const YOY=D.products_yearly||{}, MOM=D.products_monthly||{};
const yoyPeriods=Object.keys(YOY), momPeriods=Object.keys(MOM);
let tab='revenue';
let yoySel=yoyPeriods.includes('2025')?'2025':(yoyPeriods[0]||null);
let momSel=momPeriods[momPeriods.length-1]||null;
let pSort={key:'gmv',dir:-1};

document.getElementById('span').textContent=(D.summary&&D.summary.span)||'awaiting revenue export';
document.getElementById('stamp').textContent='EXTRACTED '+((D.meta&&D.meta.extracted)||'—');
document.getElementById('foot').textContent='Source: '+((D.meta&&D.meta.source)||'TailFlow exports')+
  ((D.meta&&D.meta.generated)?(' · generated '+D.meta.generated):'')+
  ' · Revenue & Product Performance populate from live exports; Conversion & ROAS await their exports.';

function kstrip(){
  const box=document.getElementById('kstrip');
  if(!D.summary){box.innerHTML='';return;}
  const s=D.summary;
  const top=Object.entries(s.gmv_by_platform).filter(([k])=>k!=='Total').sort((a,b)=>b[1]-a[1])[0];
  box.innerHTML=`
    <div class="k"><div class="l">Months</div><div class="v">${s.months}</div><div class="d">${s.span}</div></div>
    <div class="k"><div class="l">Total GMV</div><div class="v">₱${peso(s.gmv_by_platform.Total,0)}</div><div class="d">all platforms</div></div>
    <div class="k"><div class="l">Total NMV</div><div class="v">₱${peso(s.nmv_total,0)}</div><div class="d">net of returns/cancels</div></div>
    <div class="k"><div class="l">Top channel</div><div class="v">${top[0]}</div><div class="d">₱${peso(top[1],0)} GMV</div></div>`;
}

function revenue(){
  if(!D.revenue||!D.revenue.length)return placeholder('revenue');
  let h=`<table><thead><tr>
      <th class="band x" rowspan="2" style="text-align:left;left:0;position:sticky;z-index:4">Month</th>
      <th class="band g" colspan="5">GMV by Platform (PHP)</th>
      <th class="band m" rowspan="2">MoM&nbsp;Δ%</th>
      <th class="band n" colspan="5">NMV by Platform (PHP)</th>
    </tr><tr>`;
  PLAT.forEach(p=>h+=`<th class="colh">${p}</th>`); h+=`<th class="colh">Total GMV</th>`;
  PLAT.forEach(p=>h+=`<th class="colh n">${p}</th>`); h+=`<th class="colh n">Total NMV</th></tr></thead><tbody>`;
  D.revenue.forEach(r=>{
    h+=`<tr><td class="month">${r.month}</td>`;
    PLAT.forEach(p=>h+=`<td class="num">${peso(r.gmv[p])}</td>`);
    h+=`<td class="num tot">${peso(r.gmv.Total)}</td>`;
    const m=r.mom, cls=m==null?'na':m>=0?'up':'dn';
    h+=`<td class="mom ${cls}">${m==null?'—':(m>=0?'+':'')+m.toFixed(2)+'%'}</td>`;
    PLAT.forEach(p=>h+=`<td class="num">${peso(r.nmv[p])}</td>`);
    h+=`<td class="num totn">${peso(r.nmv.Total)}</td></tr>`;
  });
  const g=D.summary.gmv_by_platform;
  h+=`<tr class="grand"><td class="month">TOTAL</td>`;
  PLAT.forEach(p=>h+=`<td class="num">${peso(g[p],0)}</td>`);
  h+=`<td class="num">${peso(g.Total,0)}</td><td></td>`;
  const nsum={};PLAT.forEach(p=>nsum[p]=D.revenue.reduce((a,r)=>a+r.nmv[p],0));
  PLAT.forEach(p=>h+=`<td class="num">${peso(nsum[p],0)}</td>`);
  h+=`<td class="num">${peso(D.summary.nmv_total,0)}</td></tr></tbody></table>`;
  return h;
}

function productSection(kind){
  const monthly=kind==='monthly';
  const dataset=monthly?MOM:YOY;
  const periods=Object.keys(dataset);
  if(!periods.length)return placeholder(monthly?'products_mom':'products_yoy');
  let sel=monthly?momSel:yoySel;
  if(!periods.includes(sel)){sel=monthly?periods[periods.length-1]:(periods.includes('2025')?'2025':periods[0]);}
  const y=dataset[sel], rows=[...y.rows], k=pSort.key, dir=pSort.dir;
  rows.sort((a,b)=>{
    if(typeof a[k]==='string')return dir*a[k].localeCompare(b[k]);
    const av=a[k]==null?-Infinity:a[k], bv=b[k]==null?-Infinity:b[k];
    return dir*(av-bv);
  });
  const maxg=Math.max(...rows.map(r=>r.gmv),1);
  const ar=key=>pSort.key===key?(pSort.dir<0?' ▼':' ▲'):'';
  const chgLabel=monthly?'MoM Δ%':'YoY Δ%';
  let selector;
  if(monthly||periods.length>6){
    selector=`<select id="psel" size="1" style="font-family:'Space Grotesk';font-weight:700;font-size:13px;padding:7px 10px;border:1px solid var(--grid);border-radius:8px;background:#fff;color:#16233a;max-height:200px">`+
      periods.map(p=>`<option value="${p}" ${p===sel?'selected':''}>${p}</option>`).join('')+`</select>`;
  } else {
    selector=`<div class="yseg">${periods.map(p=>`<button class="${p===sel?'on':''}" data-y="${p}">${p}</button>`).join('')}</div>`;
  }
  let note='';
  if(monthly){
    const span=periods.length>1?` (${periods[0]} → ${periods[periods.length-1]})`:'';
    const base=periods.length>1?` · ${periods[0]} is the baseline`:'';
    note=` · <b>${periods.length} month${periods.length>1?'s':''}</b>${span} · Δ% vs previous month${base}`;
  }
  else if(sel===periods[periods.length-1])note=` · <b style="color:var(--neg)">${sel} is year-to-date</b> — YoY vs prior full year is not size-comparable`;
  let h=`<div class="pctl">${selector}
    <div class="hint">${y.totals.count} SKUs · total GMV ₱${peso(y.totals.gmv,0)} · ${intc(y.totals.qty)} units sold${note}</div>
  </div>
  <table><thead><tr>
    <th class="colh n l" style="left:0;position:sticky;z-index:4">#</th>
    <th class="colh n l sortable" data-k="name">Product${ar('name')}</th>
    <th class="colh n l sortable" data-k="sku">SKU${ar('sku')}</th>
    <th class="colh n sortable" data-k="gmv">GMV (PHP)${ar('gmv')}</th>
    <th class="colh n sortable" data-k="chg">${chgLabel}${ar('chg')}</th>
    <th class="colh n sortable" data-k="qty">Qty Sold${ar('qty')}</th>
    <th class="colh n sortable" data-k="stock">Stock${ar('stock')}</th>
    <th class="colh n sortable" data-k="st">Sell-Through${ar('st')}</th>
  </tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const stp=(r.st*100).toFixed(1)+'%', stc=r.st>=0.6?'up':r.st<0.3?'dn':'';
    const c=r.chg, ccls=c==null?'na':c>=0?'up':'dn';
    const cval=c==null?'—':(c>=0?'+':'')+c.toFixed(1)+'%';
    h+=`<tr><td class="month" style="text-align:right;min-width:34px">${i+1}</td>
      <td style="text-align:left">${r.name}</td>
      <td style="text-align:left;color:#5a6675">${r.sku}</td>
      <td class="num gbar"><i style="width:${(r.gmv/maxg*100).toFixed(1)}%"></i><span>${peso(r.gmv)}</span></td>
      <td class="mom ${ccls}">${cval}</td>
      <td class="num">${intc(r.qty)}</td><td class="num">${intc(r.stock)}</td>
      <td class="num ${stc}">${stp}</td></tr>`;
  });
  const tc=y.totals.chg, tcls=tc==null?'na':tc>=0?'up':'dn';
  const tcval=tc==null?'—':(tc>=0?'+':'')+tc.toFixed(1)+'%';
  h+=`<tr class="grand"><td class="month" style="background:#16233a;color:#fff"></td><td style="text-align:left">TOTAL · ${y.totals.count} products</td><td></td>
    <td class="num">${peso(y.totals.gmv,0)}</td><td class="mom ${tcls}" style="color:#fff">${tcval}</td><td class="num">${intc(y.totals.qty)}</td><td class="num">${intc(y.totals.stock)}</td><td></td></tr>`;
  h+=`</tbody></table>`;
  return h;
}

function placeholder(kind){
  const cfg={
    revenue:{t:'Revenue (GMV & NMV)',cols:['Month','Shopee','Shopify','Lazada','TikTok','Total GMV','MoM Δ%','NMV by platform'],
      d:'Upload the GMV orders and NMV orders exports in the sidebar to populate this sheet — one row per month, MoM change computed automatically.'},
    products_yoy:{t:'Product Performance — Year-over-Year',cols:['Product','SKU','GMV','YoY Δ%','Qty Sold','Stock','Sell-Through'],
      d:'Upload the yearly product exports (2024 / 2025 / 2026) to populate this section. The year is read from each file name and growth is shown vs the prior year.'},
    products_mom:{t:'Product Performance — Month-over-Month',cols:['Product','SKU','GMV','MoM Δ%','Qty Sold','Stock','Sell-Through'],
      d:'Upload the monthly product exports (one file per month, e.g. January2024.csv) to populate this section. Growth is shown vs the previous month.'},
    conversion:{t:'Conversion',cols:['Month','Sessions','Add-to-Cart','Reached Checkout','Orders','CVR %','By platform'],
      d:'This sheet is wired and ready. Add the Conversion export (sessions → checkout funnel per platform) and it fills the same way Revenue does.'},
    roas:{t:'ROAS',cols:['Period','Ad Spend','Ad Revenue','Blended ROAS','Shopee ROAS','TikTok ROAS','Meta / Google'],
      d:'Ready for the ad-performance export. Once spend and attributed revenue are added, blended and per-platform ROAS fill automatically.'}
  }[kind];
  return `<div class="ph"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    <h3>${cfg.t} — ready to populate</h3><p>${cfg.d}</p>
    <div class="cols">${cfg.cols.map(c=>`<span>${c}</span>`).join('')}</div></div>`;
}

function render(){
  const sc=document.getElementById('scroll');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.t===tab));
  if(tab==='revenue'){sc.innerHTML=revenue();sc.style.maxHeight='70vh';}
  else if(tab==='products_yoy'||tab==='products_mom'){
    const monthly=tab==='products_mom';
    sc.innerHTML=productSection(monthly?'monthly':'yearly');sc.style.maxHeight='72vh';
    const setSel=v=>{ if(monthly)momSel=v; else yoySel=v; render(); };
    sc.querySelectorAll('.yseg button').forEach(b=>b.onclick=()=>setSel(b.dataset.y));
    const psel=sc.querySelector('#psel'); if(psel)psel.onchange=()=>setSel(psel.value);
    sc.querySelectorAll('th.sortable').forEach(th=>th.onclick=()=>{
      const k=th.dataset.k; pSort.dir=pSort.key===k?-pSort.dir:(k==='name'||k==='sku'?1:-1); pSort.key=k; render();});
  } else {sc.innerHTML=placeholder(tab);sc.style.maxHeight='none';}
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{tab=t.dataset.t;render();});
kstrip();render();
</script>
</body>
</html>
